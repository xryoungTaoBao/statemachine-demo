spring:
  application:
    name: statemachine-demo
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/statemachine_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.yubzhou.statemachine.order.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn

statemachine:
  order:
    machine-id-prefix: "order-sm-"
    payment-timeout-minutes: 30
    refund-deadline-days: 7
    auto-receive-days: 15
    persist-enabled: true
    context-expire-hours: 72

distributed-lock:
  wait-time: 5
  lease-time: 30
  key-prefix: "sm:lock:"

scheduler:
  payment-timeout:
    enabled: true
    cron: "0 * * * * ?"
  auto-receive:
    enabled: true
    cron: "0 0 * * * ?"
  event-log-cleanup:
    enabled: true
    cron: "0 0 2 * * ?"
    retention-days: 90

rollback:
  max-history-count: 5

logging:
  level:
    com.yubzhou.statemachine: debug
    org.springframework.statemachine: info
